apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Target namespace on the test OpenShift cluster.
# Change this to match your project's namespace allocation.
namespace: labwam-test

generatorOptions:
  disableNameSuffixHash: true

labels:
  - includeTemplates: true
    includeSelectors: false
    pairs:
      environment: test
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/part-of: henri

resources:
  - ../../base/

patches:
  - path: henri/route.yaml
