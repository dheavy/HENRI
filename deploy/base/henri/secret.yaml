apiVersion: v1
kind: Secret
metadata:
  name: henri
type: Opaque
data:
  # IMPORTANT: This file is a template only!
  # Actual secrets are created from the Azure DevOps Library variable group
  # during deployment via the deploy-test.yaml pipeline.
  #
  # Variable Group: henri-secrets-test
  #
  # Required variables:
  #   GRAFANA_URL          - e.g. https://grafana.ext.icrc.org
  #   GRAFANA_API_TOKEN    - Grafana service account token (Viewer role)
  #   NETBOX_URL           - e.g. https://netbox.test.icrc.org
  #   NETBOX_TOKEN         - NetBox API token
  #   ACLED_EMAIL          - ACLED registered email
  #   ACLED_PASSWORD       - ACLED API password (mark as secret)
  #   CF_API_TOKEN         - Cloudflare Radar API token (mark as secret)
  #
  # Future (when ServiceNow service account is provisioned):
  #   SNOW_INSTANCE_URL    - e.g. https://smt.ext.icrc.org/
  #   SNOW_USERNAME        - ServiceNow service account username
  #   SNOW_PASSWORD        - ServiceNow password (mark as secret)
  #
  GRAFANA_URL: ''
  GRAFANA_API_TOKEN: ''
  NETBOX_URL: ''
  NETBOX_TOKEN: ''
  ACLED_EMAIL: ''
  ACLED_PASSWORD: ''
  CF_API_TOKEN: ''
